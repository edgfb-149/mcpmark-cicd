name: PR Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true
        captureOutput: true

      - name: Run Prettier check
        id: prettier
        run: npx prettier --check .
        continue-on-error: true
        captureOutput: true

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const eslintStatus = steps.eslint.outcome === 'success' ? '✅ Passed' : '❌ Failed';
            const prettierStatus = steps.prettier.outcome === 'success' ? '✅ Passed' : '❌ Failed';

            const commentBody = `
            ## Code Quality Report
            ### ESLint: ${eslintStatus}
            ### Prettier: ${prettierStatus}

            **ESLint Output:**
            \`\`\`
            ${steps.eslint.outputs.stdout || 'No output'}
            \`\`\`

            **Prettier Output:**
            \`\`\`
            ${steps.prettier.outputs.stdout || 'No output'}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: test
        run: npm test -- --coverage
        continue-on-error: true
        captureOutput: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const testStatus = steps.test.outcome === 'success' ? '✅ Passed' : '❌ Failed';
            const coverageSummary = steps.test.outputs.stdout || 'No coverage summary available';

            const commentBody = `
            ## Test Coverage Report
            ### Test Status: ${testStatus}

            **Coverage Summary:**
            \`\`\`
            ${coverageSummary}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check (npm audit)
        id: npm-audit
        run: npm audit --json || true
        continue-on-error: true
        captureOutput: true

      - name: Run secret scan
        id: secret-scan
        run: |
          npm install -g git-secrets
          git-secrets --scan
        continue-on-error: true
        captureOutput: true

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const auditStatus = steps.npm-audit.outcome === 'success' ? '✅ Passed' : '❌ Vulnerabilities Found';
            const secretStatus = steps.secret-scan.outcome === 'success' ? '✅ No Secrets Found' : '❌ Secrets Detected';

            const commentBody = `
            ## Security Scan Report
            ### Dependencies (npm audit): ${auditStatus}
            ### Secret Scan: ${secretStatus}

            **Vulnerability Summary:**
            \`\`\`
            ${steps.npm-audit.outputs.stdout || 'No vulnerability data'}
            \`\`\`

            **Secret Scan Output:**
            \`\`\`
            ${steps.secret-scan.outputs.stdout || 'No secret scan output'}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: npm run build
        continue-on-error: true
        captureOutput: true

      - name: Validate endpoints (example)
        id: endpoint-check
        run: |
          # Example validation: Check if build output exists
          if [ -d "dist" ]; then
            echo "✅ Build directory exists"
            # Add actual server startup/endpoint checks if your application requires it
          else
            echo "❌ Build directory missing"
            exit 1
          fi
        continue-on-error: true
        captureOutput: true

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          if-no-files-found: warn

      - name: Post Build Validation Report
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const buildStatus = steps.build.outcome === 'success' ? '✅ Build Successful' : '❌ Build Failed';
            const endpointStatus = steps.endpoint-check.outcome === 'success' ? '✅ Endpoints Validated' : '❌ Endpoint Check Failed';

            const commentBody = `
            ## Build Validation
            ### Build Status: ${buildStatus}
            ### Endpoint Validation: ${endpointStatus}

            **Build Output:**
            \`\`\`
            ${steps.build.outputs.stdout || 'No build output'}
            \`\`\`

            **Endpoint Check Output:**
            \`\`\`
            ${steps.endpoint-check.outputs.stdout || 'No endpoint check output'}
            \`\`\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });